

name: sal_lib_dev

# ============================================================================
# SALAHUDDIN LIBRARY - Development Compose File
# Run locally untuk development: docker-compose -f docker-compose.dev.yml up --build
# ============================================================================

services:

  # =========================
  # Frontend: React + Vite (Dev)
  # =========================
  sal_lib_front_end:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    container_name: sal_lib_frontend_dev
    volumes:
      - ./apps/frontend:/app  # BIND MOUNT: Code lokal terhubung langsung ke container
      - /app/node_modules  # Isolasi node_modules dari folder lokal
    ports:
      - "6173:5173"  # Akses Vite dev server di http://localhost:6173
    networks:
      - sal_lib_network_dev

  # =========================
  # Backend: Node.js + Express (Dev)
  # =========================
  sal_lib_api_server:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: sal_lib_backend_dev
    env_file:
      - ./apps/backend/.env  # Load environment variables dari .env
    volumes:
      - ./apps/backend:/app  # BIND MOUNT: Auto-restart via Nodemon saat code berubah
      - /app/node_modules
    ports:
      - "3001:5000"  # Akses Express API di http://localhost:3001
    networks:
      - sal_lib_network_dev

  # =========================
  # Web Gateway: Nginx
  # =========================
  sal_lib_web_gateway:
    image: nginx:alpine
    container_name: sal_lib_web_dev
    ports:
      - "8080:80"  # Akses web di http://localhost:8080
    volumes:
      - ./default.dev.conf:/etc/nginx/conf.d/default.conf  # Config routing
    depends_on:
      - sal_lib_front_end
      - sal_lib_api_server
    networks:
      - sal_lib_network_dev

  # =========================
  # Database: MySQL 8.0
  # =========================
  sal_lib_db_storage:
    image: mysql:8.0
    container_name: sal_lib_db_dev
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: salahuddin_library
    ports:
      - "33306:3306"  # Akses MySQL di localhost:33306
    volumes:
      - sal_lib_db_data_dev:/var/lib/mysql  # Persist data meski container dihapus
    networks:
      - sal_lib_network_dev

# =========================
# Networks & Volumes
# =========================
networks:
  sal_lib_network_dev:
    driver: bridge

volumes:
  sal_lib_db_data_dev:
