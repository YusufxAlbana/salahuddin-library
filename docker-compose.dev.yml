# Development Docker Compose for Salahuddin Library
# Sections:
# 1. sal_lib_front_end    - React + Vite frontend for browser UI and developer hot reload
# 2. sal_lib_api_server   - Node.js backend with Express and Nodemon as API service
# 3. sal_lib_web_gateway  - Nginx reverse proxy serving frontend and routing traffic
# 4. sal_lib_db_storage   - MySQL database storing library data and user records

services:
  # Frontend Service
  # Technology: React, Vite
  # Function: Hosts the browser SPA, provides UI for library users, and syncs local code changes to the container.
  sal_lib_front_end:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    container_name: sal_lib_frontend_dev
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules # Agar node_modules container tidak tertimpa folder lokal
    ports:
      - "5173:5173"
    networks:
      - sal_lib_network_dev

  # Backend API Service
  # Technology: Node.js, Express, Nodemon
  # Function: Provides REST APIs, authentication, database access, and business logic for the app.
  sal_lib_api_server:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: sal_lib_backend_dev
    env_file:
      - ./apps/backend/.env
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    networks:
      - sal_lib_network_dev

  # Web Gateway Service
  # Technology: Nginx
  # Function: Acts as a reverse proxy for the frontend and backend, and serves static content via HTTP.
  sal_lib_web_gateway:
    image: nginx:alpine
    container_name: sal_lib_web_dev
    ports:
      - "18115:80"
    volumes:
      - ./default.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - sal_lib_front_end
      - sal_lib_api_server
    networks:
      - sal_lib_network_dev

  # Database Service
  # Technology: MySQL 8.0
  # Function: Stores persistent library data, user accounts, and application state.
  sal_lib_db_storage:
    image: mysql:8.0
    container_name: sal_lib_db_dev
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: salahuddin_library
    ports:
      - "3345:3306"
    volumes:
      - sal_lib_db_data_dev:/var/lib/mysql
    networks:
      - sal_lib_network_dev

networks:
  sal_lib_network_dev:
    driver: bridge

volumes:
  sal_lib_db_data_dev:
