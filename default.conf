server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # Folder utama aplikasi (hasil build React/Vite)
    root   /usr/share/nginx/html;
    index  index.html;

    # Log untuk mempermudah debugging jika ada Error 502/404
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Mengatur Gzip agar loading web lebih ringan/cepat
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Sangat penting untuk React SPA agar routing tidak 404 saat di-reload
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optimasi Assets (CSS, JS, Images) - cache 30 hari
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off; # Matikan log untuk assets agar file log tidak cepat penuh
    }

    # Melindungi file sensitif agar tidak bisa diakses publik (.env, .git, dll)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
